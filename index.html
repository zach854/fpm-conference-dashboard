<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPM Conference Planning Dashboard</title>

<style>
:root { color-scheme: light; --bg:#f8f9fa; --card:#fff; --border:#e2e8f0; --text:#1a202c; --muted:#718096; --accent:#2563eb; --accent-light:#dbeafe; --green:#059669; --red:#dc2626; --yellow:#d97706; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.app{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden;}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;}
.header h1{font-size:17px;font-weight:700;}
.header .sub{font-size:12px;color:var(--muted);margin-left:auto;}
.main{display:grid;grid-template-columns:260px 1fr;overflow:hidden;}
.sidebar{border-right:1px solid var(--border);background:var(--card);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-section{padding:12px 16px 4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.conf-item{padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;}
.conf-item:hover{background:var(--bg);}
.conf-item.active{border-left-color:var(--accent);background:var(--accent-light);}
.conf-name{font-weight:600;font-size:13px;margin-bottom:2px;}
.conf-meta{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;}
.badge{display:inline-flex;align-items:center;padding:1px 5px;border-radius:8px;font-size:10px;font-weight:700;}
.b25{background:#fef9c3;color:#854d0e;}
.b26{background:#dcfce7;color:#166534;}
.overview-btn{margin:12px 14px 4px;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;}
.overview-btn:hover{opacity:.9;}
.content{overflow-y:auto;padding:20px;background:var(--bg);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.stat-value{font-size:22px;font-weight:700;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:10px;}
.chart-wrap{position:relative;height:200px;}
.detail-header{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:14px;}
.detail-header h2{font-size:20px;font-weight:700;margin-bottom:6px;}
.detail-meta{font-size:13px;color:var(--muted);margin-bottom:14px;display:flex;gap:16px;flex-wrap:wrap;}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;}
.budget-bar{display:flex;align-items:center;gap:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:9px 14px;margin-bottom:14px;flex-wrap:wrap;}
.budget-bar label{font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;}
.budget-bar input{padding:4px 10px;border:1px solid #93c5fd;border-radius:5px;font-size:13px;width:130px;}
.budget-bar .bstatus{font-size:13px;font-weight:700;margin-left:4px;}
.over{color:var(--red);} .under{color:var(--green);} .neutral{color:var(--muted);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
.panel h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:7px 10px;border-bottom:2px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
td{padding:7px 10px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.money{text-align:right;font-variant-numeric:tabular-nums;}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ai{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;display:inline-flex;align-items:center;gap:6px;}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border);}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.note-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;max-height:280px;overflow-y:auto;}
.note-card h3{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.note-item{background:var(--bg);border-radius:5px;padding:9px 11px;margin-bottom:8px;font-size:12px;line-height:1.5;}
.note-author{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;padding:24px;width:700px;max-width:95vw;max-height:88vh;overflow-y:auto;}
.modal h2{font-size:17px;font-weight:700;margin-bottom:4px;}
.modal .msub{color:var(--muted);font-size:13px;margin-bottom:16px;}
.modal-body{font-size:13px;line-height:1.7;white-space:pre-wrap;}
.modal-loading{display:flex;align-items:center;gap:10px;color:var(--muted);padding:20px 0;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;border-top:1px solid var(--border);padding-top:14px;}
.empty{text-align:center;padding:60px;color:var(--muted);}
.yr-bar{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.yr-label{font-size:11px;font-weight:600;width:36px;color:var(--muted);}
.yr-bg{flex:1;background:var(--bg);border-radius:3px;height:14px;overflow:hidden;}
.yr-fill{height:100%;background:var(--accent);border-radius:3px;opacity:.8;}
.yr-amt{font-size:11px;color:var(--muted);width:70px;text-align:right;}
.full-table{grid-column:1/-1;}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>📋 FPM Conference Planning Dashboard</h1>

  </div>
  <div class="content" id="mainContent"><div class="empty">Click Overview or select a conference.</div></div>
</div>
</div>

<div class="modal-overlay" id="planModal">

  <div class="modal-actions">
    <button class="btn btn-outline" onclick="document.getElementById('planModal').classList.remove('open')">Close</button>
  </div>
</div>
</div>

];

// ─── NORMALIZE ───────────────────────────────────────────────
const BUDGETS = {}; // in-session budget tracking

function normalize(name) {
  const n = name.toLowerCase();
  if (n.includes('csn forum') || n === 'csn' || n.includes('christian stewardship network')) return 'CSN Forum';
  if (n.includes('csn regional') || n.includes('csn oh') || n.includes('csn ohio')) return 'CSN Regional';
  if (n.includes('xp seminar') || n === 'xpastor seminar' || n === 'xpastor') return 'XP Seminar';
  if (n.includes('xp summit')) return 'XP Summit';
  if (n.includes('ic3')) return 'IC3 Conference';
  if (n.includes('iccon') || n.includes('intentional church')) return 'ICCON';
  if (n.includes('vineyard west') || (n.includes('vineyard') && n.includes('west'))) return 'Vineyard West';
  if (n.includes('vineyard east') || (n.includes('vineyard') && n.includes('east'))) return 'Vineyard East';
  if (n.includes('vineyard') && (n.includes('national') || n.includes('usa national'))) return 'Vineyard National';
  if (n.includes('abhe advancement')) return 'ABHE Advancement';
  if (n.includes('abhe')) return 'ABHE';
  if (n.includes('next level')) return 'Next Level';
  if (n.includes('spire')) return 'Spire';
  if (n.includes('dunham')) return 'Dunham Summit';
  return name;
}

const DATA = RAW.map(r => ({...r, confKey: normalize(r.conference)}));

// ─── HELPERS ─────────────────────────────────────────────────
function fmt(n) { return n > 0 ? '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—'; }
function fmtN(n) { return n > 0 ? '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '$0.00'; }

function getConferences() {
  const map = {};
  DATA.forEach(r => {
    if (!map[r.confKey]) map[r.confKey] = {key: r.confKey, years: new Set(), rows: []};
    map[r.confKey].years.add(r.year);
    map[r.confKey].rows.push(r);
  });
  return Object.values(map).sort((a,b) => a.key.localeCompare(b.key));
}

function totalByYear(rows, yr) {
  return rows.filter(r=>r.year===yr).reduce((s,r)=>s+r.total,0);
}

// ─── CHARTS ──────────────────────────────────────────────────
let charts = {};
function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

// ─── SIDEBAR ─────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('confList');
  const confs = getConferences();
  list.innerHTML = confs.map(c => {
    const yrs = [...c.years].sort();
    const badges = yrs.map(y => `<span class="badge b${String(y).slice(-2)}">${y}</span>`).join('');
    const totalAll = c.rows.reduce((s,r)=>s+r.total,0);
    return `<div class="conf-item" id="ci-${c.key.replace(/\s+/g,'_')}" onclick="showConf('${c.key.replace(/'/g,"\\'")}')">
      <div class="conf-name">${c.key}</div>
      <div class="conf-meta">${badges}<span>${fmtN(totalAll)} total</span></div>
    </div>`;
  }).join('');
}

function setActive(key) {
  document.querySelectorAll('.conf-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ci-' + key.replace(/\s+/g,'_'));
  if (el) el.classList.add('active');
}

// ─── OVERVIEW ────────────────────────────────────────────────
function showOverview() {
  destroyCharts();
  setActive('');
  document.querySelectorAll('.conf-item').forEach(el => el.classList.remove('active'));

  const d25 = DATA.filter(r=>r.year===2025);
  const d26 = DATA.filter(r=>r.year===2026);
  const confs = getConferences();
  const total25 = d25.reduce((s,r)=>s+r.total,0);
  const total26 = d26.reduce((s,r)=>s+r.total,0);
  const events25 = new Set(d25.map(r=>r.confKey)).size;
  const events26 = new Set(d26.map(r=>r.confKey)).size;

  // Top conferences by total spend (all years)
  const byConf = confs.map(c=>({key:c.key, total: c.rows.reduce((s,r)=>s+r.total,0)})).sort((a,b)=>b.total-a.total);

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Conferences</div><div class="stat-value">${confs.length}</div><div class="stat-sub">across 2025–2026</div></div>
      <div class="stat-card"><div class="stat-label">2025 Total Spend</div><div class="stat-value">${fmtN(total25)}</div><div class="stat-sub">${events25} unique conferences, ${d25.length} attendee reports</div></div>
      <div class="stat-card"><div class="stat-label">2026 Total Spend</div><div class="stat-value">${fmtN(total26)}</div><div class="stat-sub">${events26} unique conferences, ${d26.length} attendee reports</div></div>
      <div class="stat-card"><div class="stat-label">YoY Change</div><div class="stat-value" style="color:${total26>total25?'var(--red)':'var(--green)'}">
        ${total26>total25?'▲':'▼'} ${Math.abs(Math.round((total26-total25)/total25*100))}%</div>
        <div class="stat-sub">${total26>total25?'increase':'decrease'} from 2025</div>
      </div>
    </div>
    <div class="charts-row">
      <div class="chart-card"><h3>Total Spend by Year</h3><div class="chart-wrap"><canvas id="chartYears"></canvas></div></div>
      <div class="chart-card"><h3>Top Conferences by Total Spend</h3><div class="chart-wrap"><canvas id="chartConfs"></canvas></div></div>
    </div>
    <div class="panel">
      <h3>All Conferences — Year-over-Year Summary</h3>
      <table>
        <thead><tr><th>Conference</th><th class="money">2025 Spend</th><th class="money">2026 Spend</th><th class="money">Total</th><th>Years Attended</th></tr></thead>
        <tbody>${confs.map(c=>{
          const t25=totalByYear(c.rows,2025), t26=totalByYear(c.rows,2026);
          return `<tr onclick="showConf('${c.key.replace(/'/g,"\\'")}');" style="cursor:pointer">
            <td><strong>${c.key}</strong></td>
            <td class="money">${t25>0?fmtN(t25):'—'}</td>
            <td class="money">${t26>0?fmtN(t26):'—'}</td>
            <td class="money">${fmtN(c.rows.reduce((s,r)=>s+r.total,0))}</td>
            <td>${[...c.years].sort().map(y=>`<span class="badge b${String(y).slice(-2)}">${y}</span>`).join(' ')}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;

  // Year chart
  charts.years = new Chart(document.getElementById('chartYears'), {
    type: 'bar',
    data: { labels: ['2025','2026'], datasets: [{label:'Total Spend', data:[total25,total26], backgroundColor:['#3b82f6','#22c55e'], borderRadius:5}]},
    options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()}}}}
  });

  // Top conf chart
  const top = byConf.slice(0,8);
  charts.confs = new Chart(document.getElementById('chartConfs'), {
    type: 'bar',
    data: { labels: top.map(c=>c.key.length>14?c.key.substring(0,14)+'…':c.key), datasets: [{label:'Total Spend', data:top.map(c=>c.total), backgroundColor:'#6366f1', borderRadius:4}]},
    options: {indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>'$'+v.toLocaleString()}}}}
  });
}

// ─── CONFERENCE DETAIL ────────────────────────────────────────
let currentConf = null;
function showConf(key) {
  currentConf = key;
  destroyCharts();
  setActive(key);
  const confs = getConferences();
  const conf = confs.find(c=>c.key===key);
  if (!conf) return;

  const rows = conf.rows;
  const years = [...conf.years].sort();
  const totalAll = rows.reduce((s,r)=>s+r.total,0);
  const budget = BUDGETS[key] || 0;

  // Unique attendees
  const attendees = [...new Set(rows.map(r=>r.attendee))];

  // Spending by year
  const byYear = years.map(y=>({year:y, total:totalByYear(rows,y), rows:rows.filter(r=>r.year===y)}));

  // Expense breakdown totals (all years)
  const totFees = rows.reduce((s,r)=>s+r.fees,0);
  const totExpenses = rows.reduce((s,r)=>s+r.expenses,0);
  const totAir = rows.reduce((s,r)=>s+r.airTravel,0);
  const totMeals = rows.reduce((s,r)=>s+r.meals,0);
  const totMileage = rows.reduce((s,r)=>s+r.mileage,0);
  const totOther = totExpenses - totAir - totMeals - totMileage;

  // Budget status
  const lastYrTotal = byYear.length > 0 ? byYear[byYear.length-1].total : 0;
  let bStatusHtml = '';
  if (budget > 0) {
    const diff = budget - lastYrTotal;
    const pct = Math.abs(Math.round(diff/budget*100));
    bStatusHtml = diff >= 0
      ? `<span class="bstatus under">✓ ${fmtN(diff)} under budget (${pct}%)</span>`
      : `<span class="bstatus over">✗ ${fmtN(Math.abs(diff))} over budget (${pct}%)</span>`;
  }

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="detail-header">
      <h2>${key}</h2>
      <div class="detail-meta">
        <span>📅 ${years.join(', ')}</span>
        <span>👥 ${attendees.slice(0,3).join(', ')}${attendees.length>3?' +' + (attendees.length-3) + ' more':''}</span>
        <span>💰 ${fmtN(totalAll)} total across all years</span>
      </div>
      <div class="detail-actions">
        <button class="btn btn-ai" onclick="openPlanModal('${key.replace(/'/g,"\\'")}')">✨ Plan for Next Year</button>
        <button class="btn btn-outline" onclick="showOverview()">← Back to Overview</button>
      </div>
    </div>

    <div class="budget-bar">
      <label>📊 Budget for most recent year:</label>
      <input type="number" id="budgetInput" placeholder="Enter amount..." value="${budget||''}" onchange="setBudget('${key.replace(/'/g,"\\'")}', this.value)" oninput="updateBudgetStatus('${key.replace(/'/g,"\\'")}', this.value, ${lastYrTotal})">
      <span id="budgetStatus">${bStatusHtml}</span>
    </div>

    <div class="detail-grid">
      <div class="panel">
        <h3>Year-over-Year Spending</h3>
        <div class="chart-wrap"><canvas id="chartYoY"></canvas></div>
      </div>
      <div class="panel">
        <h3>Expense Breakdown (All Years)</h3>
        <div class="chart-wrap"><canvas id="chartBreakdown"></canvas></div>
      </div>
    </div>

    <div class="panel" style="margin-bottom:14px">
      <h3>Attendee Reports</h3>
      <table>
        <thead><tr><th>Year</th><th>Attendee</th><th>Role</th><th>Location</th><th>Dates</th><th class="money">Fees</th><th class="money">Expenses</th><th class="money">Total</th></tr></thead>
        <tbody>${rows.sort((a,b)=>b.year-a.year||a.attendee.localeCompare(b.attendee)).map(r=>`
          <tr>
            <td><span class="badge b${String(r.year).slice(-2)}">${r.year}</span></td>
            <td>${r.attendee}</td>
            <td>${r.type}</td>
            <td>${r.location||'—'}</td>
            <td>${r.dates}</td>
            <td class="money">${r.fees>0?fmtN(r.fees):'—'}</td>
            <td class="money">${r.expenses>0?fmtN(r.expenses):'—'}</td>
            <td class="money"><strong>${fmtN(r.total)}</strong></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="panel" style="margin-bottom:14px">
      <h3>Spending Histogram — Individual Report Totals</h3>
      <div class="chart-wrap"><canvas id="chartHist"></canvas></div>
    </div>

    <div class="notes-grid">
      <div class="note-card">
        <h3>📝 Summary & Overview Notes</h3>
        ${rows.filter(r=>r.summary && r.summary.trim() && r.summary.toLowerCase()!=='n/a').map(r=>`
          <div class="note-item">
            <div class="note-author">${r.attendee} <span class="badge b${String(r.year).slice(-2)}">${r.year}</span></div>
            ${r.summary}
          </div>`).join('') || '<div class="note-item" style="color:var(--muted)">No notes recorded.</div>'}
      </div>
      <div class="note-card">
        <h3>💡 Suggestions for Next Time</h3>
        ${rows.filter(r=>r.suggestions && r.suggestions.trim() && r.suggestions.toLowerCase()!=='n/a' && r.suggestions.toLowerCase()!=='none').map(r=>`
          <div class="note-item">
            <div class="note-author">${r.attendee} <span class="badge b${String(r.year).slice(-2)}">${r.year}</span></div>
            ${r.suggestions}
          </div>`).join('') || '<div class="note-item" style="color:var(--muted)">No suggestions recorded.</div>'}
      </div>
    </div>`;

  // Year-over-Year chart
  charts.yoy = new Chart(document.getElementById('chartYoY'), {
    type: 'bar',
    data: {
      labels: byYear.map(b=>String(b.year)),
      datasets: [{label:'Total Spend', data:byYear.map(b=>b.total), backgroundColor:byYear.map(b=>b.year===2025?'#3b82f6':'#22c55e'), borderRadius:5}]
    },
    options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()}}}}
  });

  // Breakdown chart
  const hasData = totFees+totAir+totMeals+totMileage+Math.max(totOther,0) > 0;
  if (hasData) {
    charts.breakdown = new Chart(document.getElementById('chartBreakdown'), {
      type: 'doughnut',
      data: {
        labels: ['Consultant Fees','Air Travel','Meals','Mileage','Other Expenses'],
        datasets: [{data:[totFees,totAir,totMeals,totMileage,Math.max(totOther,0)], backgroundColor:['#6366f1','#3b82f6','#22c55e','#f59e0b','#ec4899'], borderWidth:2}]
      },
      options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}
    });
  }

  // Histogram of individual totals
  const totals = rows.filter(r=>r.total>0).map(r=>r.total).sort((a,b)=>a-b);
  if (totals.length > 0) {
    const labels = rows.filter(r=>r.total>0).sort((a,b)=>a.total-b.total).map(r=>r.attendee.split(' ').slice(-1)[0] + ' ' + r.year);
    charts.hist = new Chart(document.getElementById('chartHist'), {
      type: 'bar',
      data: {labels, datasets:[{label:'Total Billed', data:totals, backgroundColor:'#8b5cf6', borderRadius:4}]},
      options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()}}}}
    });
  }
}

function setBudget(key, val) {
  BUDGETS[key] = parseFloat(val) || 0;
}

function updateBudgetStatus(key, val, lastTotal) {
  BUDGETS[key] = parseFloat(val) || 0;
  const budget = BUDGETS[key];
  const statusEl = document.getElementById('budgetStatus');
  if (!statusEl || budget <= 0) { if(statusEl) statusEl.innerHTML = ''; return; }
  const diff = budget - lastTotal;
  const pct = Math.abs(Math.round(diff/budget*100));
  statusEl.innerHTML = diff >= 0
    ? `<span class="bstatus under">✓ ${fmtN(diff)} under budget (${pct}%)</span>`
    : `<span class="bstatus over">✗ ${fmtN(Math.abs(diff))} over budget (${pct}%)</span>`;
}

// ─── AI PLANNING ─────────────────────────────────────────────
function openPlanModal(key) {
  const confs = getConferences();
  const conf = confs.find(c=>c.key===key);
  if (!conf) return;

  const modal = document.getElementById('planModal');
  const sub = document.getElementById('planModalSub');
  const body = document.getElementById('planModalBody');

  sub.textContent = `Planning brief for: ${key} (based on ${conf.rows.length} historical reports)`;
  body.innerHTML = '<div class="modal-loading"><div class="spinner"></div>Generating your plan with Claude AI...</div>';
  modal.classList.add('open');

  const budget = BUDGETS[key];
  const years = [...conf.years].sort();
  const rows = conf.rows;

  const prompt = `You are helping plan for the upcoming "${key}" conference based on our team's historical attendance data. 

Here is our data from previous years:

${rows.map(r => `
--- ${r.year} | ${r.attendee} (${r.type}) ---
Location: ${r.location || 'not recorded'}
Dates: ${r.dates}
Fees: ${fmtN(r.fees)} | Expenses: ${fmtN(r.expenses)} | Total: ${fmtN(r.total)}
Air Travel: ${fmtN(r.airTravel)} | Meals: ${fmtN(r.meals)} | Mileage: ${fmtN(r.mileage)}
Summary: ${r.summary || 'none'}
Suggestions: ${r.suggestions || 'none'}
Expense Notes: ${r.expenseNotes || 'none'}
`).join('\n')}

${budget > 0 ? `Our budget for this conference next year: ${fmtN(budget)}` : ''}

Based on this history, please provide a concise, practical planning brief covering:
1. **Recommended Attendees** — who should attend and why (based on roles and history)
2. **Budget Estimate** — realistic cost estimate with breakdown (fees, air, hotel, meals, misc)${budget > 0 ? ` and comparison to our ${fmtN(budget)} budget` : ''}
3. **Logistics Recommendations** — travel, materials, booth setup based on past notes
4. **Strategic Priorities** — top 3-4 goals for the conference based on suggestions and patterns
5. **Action Items Before the Conference** — specific prep steps from past suggestions

Keep each section brief and actionable. Focus on what would actually help the team prepare.`;

  if (typeof window.cowork !== 'undefined' && window.cowork.askClaude) {
    window.cowork.askClaude(prompt, []).then(result => {
      body.innerHTML = `<div class="modal-body">${result.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
    }).catch(err => {
      body.innerHTML = `<div class="modal-body" style="color:var(--red)">Error generating plan: ${err.message || err}. Please try again.</div>`;
    });
  } else {
    // External fallback: show prompt ready to paste into Claude.ai
    window._lastPrompt = prompt;
    body.innerHTML = `
      <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px;">
        <strong style="color:#166534;">✅ Your planning prompt is ready!</strong><br>
        <span style="color:#15803d;">Click the button below to copy it, then paste it into <a href="https://claude.ai" target="_blank" style="color:#2563eb;">claude.ai</a> to get your AI-generated plan.</span>
      </div>
      <div style="background:#f8f9fa;border:1px solid #e2e8f0;border-radius:6px;padding:14px;font-size:12px;line-height:1.6;max-height:300px;overflow-y:auto;white-space:pre-wrap;font-family:monospace;" id="promptPreview">${prompt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
    // Add copy button to modal actions
    const actions = document.querySelector('.modal-actions');
    if (actions && !document.getElementById('copyPromptBtn')) {
      const btn = document.createElement('button');
      btn.id = 'copyPromptBtn';
      btn.className = 'btn btn-primary';
      btn.textContent = '📋 Copy Prompt';
      btn.onclick = () => {
        navigator.clipboard.writeText(window._lastPrompt).then(() => {
          btn.textContent = '✓ Copied!';
          setTimeout(() => btn.textContent = '📋 Copy Prompt', 2000);
        });
      };
      actions.insertBefore(btn, actions.firstChild);
    }
  }
}

// ─── INIT ────────────────────────────────────────────────────
buildSidebar();
showOverview();
</script>
