<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPM Conference Planning Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root {
  color-scheme: light;
  --bg: #f8fafc;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1a1a1a;
  --muted: #64748b;
  --accent: #f8182d;
  --accent-light: #fff5f5;
  --sidebar-bg: #0f172a;
  --sidebar-text: #fff;
  --sidebar-active-bg: #ef4444;
  --sidebar-active-text: #ffffff;
  --gold: #e4cc99;
  --brown: #64748b;
  --green: #059669;
  --red: #f8182d;
  --yellow: #d97706;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.app{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden;}
.header{background:#0f172a;border-bottom:3px solid var(--accent);padding:0 20px;display:flex;align-items:center;gap:12px;}
.header h1{font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;}
.header h1 span.logo{color:var(--gold);}
.year-filter{display:flex;gap:4px;margin-left:16px;}
.yr-btn{padding:5px 14px;border-radius:20px;border:1.5px solid #555;background:transparent;color:#ccc;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.yr-btn:hover{border-color:var(--accent);color:var(--accent);}
.yr-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.header .hright{margin-left:auto;display:flex;align-items:center;gap:10px;}
.header .sub{font-size:12px;color:#888;}
.btn-admin{padding:6px 14px;background:transparent;border:1.5px solid #555;color:#ccc;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.btn-admin:hover{border-color:var(--accent);color:var(--accent);}
.main{display:grid;grid-template-columns:260px 1fr;overflow:hidden;}
.sidebar{background:var(--sidebar-bg);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-section{padding:12px 16px 4px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;}
.conf-item{padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;color:rgba(255,255,255,.85);}
.conf-item:hover{background:rgba(255,255,255,.1);}
.conf-item.active{border-left-color:var(--accent);background:var(--sidebar-active-bg);color:var(--sidebar-active-text);}
.conf-item.active .conf-meta{color:#555;}
.conf-name{font-weight:600;font-size:13px;margin-bottom:2px;}
.conf-meta{font-size:11px;color:rgba(255,255,255,.6);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;}
.b25{background:#fef9c3;color:#854d0e;}
.b26{background:#dcfce7;color:#166534;}
.overview-btn{margin:12px 14px 4px;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;letter-spacing:.02em;}
.overview-btn:hover{background:#d01025;}
.content{overflow-y:auto;padding:20px;background:var(--bg);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;border-top:3px solid var(--accent);}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.stat-value{font-size:22px;font-weight:700;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:10px;}
.chart-wrap{position:relative;height:200px;}
.detail-header{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:14px;border-top:3px solid var(--accent);}
.detail-header h2{font-size:20px;font-weight:700;margin-bottom:6px;}
.detail-meta{font-size:13px;color:var(--muted);margin-bottom:14px;display:flex;gap:16px;flex-wrap:wrap;}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;}
.budget-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:9px 14px;margin-bottom:8px;flex-wrap:wrap;}
.budget-bar label{font-size:13px;font-weight:600;color:var(--brown);white-space:nowrap;}
.budget-bar input{padding:4px 10px;border:1px solid var(--border);border-radius:5px;font-size:13px;width:130px;}
.budget-bar .bstatus{font-size:13px;font-weight:700;margin-left:4px;}
.over{color:var(--red);} .under{color:var(--green);} .neutral{color:var(--muted);}
.spons-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:9px 14px;margin-bottom:14px;flex-wrap:wrap;}
.spons-bar label{font-size:13px;font-weight:600;color:var(--green);white-space:nowrap;}
.spons-bar input{padding:4px 10px;border:1px solid #86efac;border-radius:5px;font-size:13px;width:130px;}
.spons-note{font-size:12px;color:var(--muted);margin-left:4px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
.panel h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:7px 10px;border-bottom:2px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
td{padding:7px 10px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.money{text-align:right;font-variant-numeric:tabular-nums;}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ai{background:linear-gradient(135deg,#0f172a,#1e293b);color:#e2e8f0;display:inline-flex;align-items:center;gap:6px;border:1px solid #334155;}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border);}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.note-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;max-height:280px;overflow-y:auto;}
.note-card h3{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.note-item{background:var(--bg);border-radius:5px;padding:9px 11px;margin-bottom:8px;font-size:12px;line-height:1.5;}
.note-author{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;padding:24px;width:700px;max-width:95vw;max-height:88vh;overflow-y:auto;border-top:4px solid var(--accent);}
.modal h2{font-size:17px;font-weight:700;margin-bottom:4px;}
.modal .msub{color:var(--muted);font-size:13px;margin-bottom:16px;}
.modal-body{font-size:13px;line-height:1.7;}.modal-body h3{font-size:16px;margin-bottom:10px;color:var(--text);}.modal-body h4{font-size:13px;font-weight:700;color:var(--accent);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em;}.modal-body p{margin-bottom:10px;}.modal-body ul,.modal-body ol{padding-left:20px;margin-bottom:10px;}.modal-body li{margin-bottom:4px;}
.modal-loading{display:flex;align-items:center;gap:10px;color:var(--muted);padding:20px 0;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;border-top:1px solid var(--border);padding-top:14px;}
.empty{text-align:center;padding:60px;color:var(--muted);}
.yr-bar{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.yr-label{font-size:11px;font-weight:600;width:36px;color:var(--muted);}
.yr-bg{flex:1;background:var(--bg);border-radius:3px;height:14px;overflow:hidden;}
.yr-fill{height:100%;background:var(--accent);border-radius:3px;opacity:.8;}
.yr-amt{font-size:11px;color:var(--muted);width:70px;text-align:right;}
.full-table{grid-column:1/-1;}
/* ADMIN PANEL */
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px;}
.admin-overlay.open{display:flex;}
.admin-panel{background:#fff;border-radius:12px;width:960px;max-width:96vw;max-height:calc(100vh - 80px);display:flex;flex-direction:column;border-top:4px solid var(--brown);}
.admin-header{padding:20px 24px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.admin-header h2{font-size:18px;font-weight:700;flex:1;}
.admin-header h2 span{color:var(--brown);}
.admin-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 24px;}
.admin-tab{padding:12px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;}
.admin-tab:hover{color:var(--text);}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.admin-body{padding:20px 24px;overflow-y:auto;flex:1;}
.admin-section{margin-bottom:24px;}
.admin-section h3{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--brown);}
.admin-section p{font-size:12px;color:var(--muted);margin-bottom:12px;}
.name-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;font-size:13px;margin-bottom:6px;}
.name-grid .arrow{color:var(--muted);text-align:center;}
.name-grid input{padding:5px 9px;border:1px solid var(--border);border-radius:5px;font-size:13px;width:100%;}
.name-grid input:focus{outline:none;border-color:var(--brown);box-shadow:0 0 0 2px rgba(136,118,99,.15);}
.admin-save-row{display:flex;gap:8px;margin-top:12px;}
.spons-grid{display:grid;gap:8px;}
.spons-row{display:grid;grid-template-columns:180px 80px 1fr;gap:8px;align-items:center;font-size:13px;}
.spons-row label{font-weight:600;}
.spons-row .yr-badge{text-align:center;}
.spons-row input{padding:5px 9px;border:1px solid var(--border);border-radius:5px;font-size:13px;max-width:150px;}
.data-table-wrap{overflow-x:auto;}
.data-table-wrap table{min-width:900px;}
.data-table-wrap td input{width:100%;border:none;background:transparent;font-size:12px;padding:2px 4px;}
.data-table-wrap td input:focus{outline:1px solid var(--accent);border-radius:3px;}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;border-left:4px solid var(--gold);}
.toast.show{opacity:1;}
.green-text{color:var(--green);}
.section-divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1><span class="logo">FPM</span> Conference Dashboard</h1>
  <div class="year-filter">
    <button class="yr-btn active" id="yrBtnAll" onclick="setYear(null)">All Years</button>
    <button class="yr-btn" id="yrBtn2025" onclick="setYear(2025)">2025</button>
    <button class="yr-btn" id="yrBtn2026" onclick="setYear(2026)">2026</button>
  </div>
  <div class="hright">
    <span class="sub">Post-Event Reports &nbsp;|&nbsp; Select a conference</span>
    <button class="btn-admin" onclick="openAdmin()">⚙ Admin</button>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <button class="overview-btn" onclick="showOverview()">&#128202; Overview</button>
    <div class="sidebar-section">Conferences</div>
    <div id="confList"></div>
  </div>
  <div class="content" id="mainContent"><div class="empty">Click Overview or select a conference.</div></div>
</div>
</div>

<!-- Plan Modal -->
<div class="modal-overlay" id="planModal">
<div class="modal">
  <h2>&#10024; Conference Planning Brief</h2>
  <div class="msub" id="planModalSub"></div>
  <div id="planModalBody"><div class="modal-loading"><div class="spinner"></div>Loading...</div></div>
  <div class="modal-actions">
    <button class="btn btn-outline" onclick="document.getElementById('planModal').classList.remove('open')">Close</button>
  </div>
</div>
</div>

<!-- Admin Panel -->
<div class="admin-overlay" id="adminOverlay" onclick="adminOverlayClick(event)">
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h2>&#9881; <span>Admin</span> — Conference Management</h2>
    <button class="btn btn-outline" onclick="closeAdmin()">&#10005; Close</button>
  </div>
  <div class="admin-tabs">
    <div class="admin-tab active" id="atab0" onclick="switchAdminTab(0)">&#128221; Conference Names</div>
    <div class="admin-tab" id="atab1" onclick="switchAdminTab(1)">&#128181; Sponsorships</div>
    <div class="admin-tab" id="atab2" onclick="switchAdminTab(2)">&#128202; Budgets</div>
    <div class="admin-tab" id="atab3" onclick="switchAdminTab(3)">&#128196; Data Review</div>
  </div>
  <div class="admin-body" id="adminBody"></div>
</div>
</div>

<div class="toast" id="toast"></div>

// ─── LOCALSTORAGE HELPERS ─────────────────────────────────────────────────
function lsGet(key, def={}) { try { return JSON.parse(localStorage.getItem(key) || 'null') || def; } catch { return def; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function getNameOverrides() { return lsGet('fpm_name_overrides', {}); }
function saveNameOverrides(v) { lsSet('fpm_name_overrides', v); }
function getSponsorships() { return lsGet('fpm_sponsorships', {}); }
function saveSponsorships(v) { lsSet('fpm_sponsorships', v); }
function getBudgetsLS() { return lsGet('fpm_budgets', {}); }
function saveBudgetsLS(v) { lsSet('fpm_budgets', v); }

// ─── YEAR FILTER ──────────────────────────────────────────────────────────
let activeYear = null;
function setYear(yr) {
  activeYear = yr;
  document.querySelectorAll('.yr-btn').forEach(b => b.classList.remove('active'));
  const id = yr ? 'yrBtn' + yr : 'yrBtnAll';
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  buildSidebar();
  showOverview();
}

// ─── NORMALIZE ────────────────────────────────────────────────────────────
function normalize(name) {
  const overrides = getNameOverrides();
  if (overrides[name]) return overrides[name];
  const n = name.toLowerCase();
  if (n.includes('csn forum') || n === 'csn' || n.includes('christian stewardship network')) return 'CSN Forum';
  if (n.includes('csn regional') || n.includes('csn oh') || n.includes('csn ohio')) return 'CSN Regional';
  if (n.includes('xp seminar') || n === 'xpastor seminar' || n === 'xpastor') return 'XP Seminar';
  if (n.includes('xp summit')) return 'XP Summit';
  if (n.includes('ic3')) return 'IC3 Conference';
  if (n.includes('iccon') || n.includes('intentional church')) return 'ICCON';
  if (n.includes('vineyard west') || (n.includes('vineyard') && n.includes('west'))) return 'Vineyard West';
  if (n.includes('vineyard east') || (n.includes('vineyard') && n.includes('east'))) return 'Vineyard East';
  if (n.includes('vineyard') && (n.includes('national') || n.includes('usa national'))) return 'Vineyard National';
  if (n.includes('abhe advancement')) return 'ABHE Advancement';
  if (n.includes('abhe')) return 'ABHE';
  if (n.includes('next level')) return 'Next Level';
  if (n.includes('spire')) return 'Spire';
  if (n.includes('dunham')) return 'Dunham Summit';
  return name;
}

// Rebuild DATA with fresh normalization each time (needed when overrides change)
function getData() {
  return RAW.map(r => ({...r, confKey: normalize(r.conference)}));
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
function fmt(n) { return n > 0 ? '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—'; }
function fmtN(n) { return n > 0 ? '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '$0.00'; }
function fmtS(n) { return '$' + (n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function getConferences(data) {
  const DATA = data || getData();
  const filtered = activeYear ? DATA.filter(r => r.year === activeYear) : DATA;
  const map = {};
  filtered.forEach(r => {
    if (!map[r.confKey]) map[r.confKey] = {key: r.confKey, years: new Set(), rows: []};
    map[r.confKey].years.add(r.year);
    map[r.confKey].rows.push(r);
  });
  return Object.values(map).sort((a,b) => a.key.localeCompare(b.key));
}

function totalByYear(rows, yr) {
  return rows.filter(r=>r.year===yr).reduce((s,r)=>s+r.total,0);
}

function getSponsorshipForConf(key, yr) {
  const s = getSponsorships();
  const k = yr ? key + '__' + yr : null;
  if (k && s[k] !== undefined) return parseFloat(s[k]) || 0;
  // Sum all years if no year specified
  let total = 0;
  Object.keys(s).forEach(sk => {
    if (sk.startsWith(key + '__')) total += parseFloat(s[sk]) || 0;
  });
  return total;
}

let charts = {};
function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('confList');
  const confs = getConferences();
  list.innerHTML = confs.map(c => {
    const yrs = [...c.years].sort();
    const badges = yrs.map(y => `<span class="badge b${String(y).slice(-2)}">${y}</span>`).join('');
    const totalAll = c.rows.reduce((s,r)=>s+r.total,0);
    const spons = getSponsorshipForConf(c.key);
    const net = totalAll - spons;
    return `<div class="conf-item" id="ci-${c.key.replace(/\s+/g,'_')}" onclick="showConf('${c.key.replace(/'/g,"\\'")}')"> 
      <div class="conf-name">${c.key}</div>
      <div class="conf-meta">${badges}<span>${fmtN(net)} net</span></div>
    </div>`;
  }).join('');
}

function setActive(key) {
  document.querySelectorAll('.conf-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ci-' + key.replace(/\s+/g,'_'));
  if (el) el.classList.add('active');
}

            <td><span class="badge b${String(r.year).slice(-2)}">${r.year}</span></td>
            <td>${r.attendee}</td>
            <td>${r.type}</td>
            <td>${r.location||'—'}</td>
            <td>${r.dates}</td>
            <td class="money">${r.fees>0?fmtN(r.fees):'—'}</td>
            <td class="money">${r.expenses>0?fmtN(r.expenses):'—'}</td>
            <td class="money"><strong>${fmtN(r.total)}</strong></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="panel" style="margin-bottom:14px">
      <h3>Spending Histogram</h3>
      <div class="chart-wrap"><canvas id="chartHist"></canvas></div>
    </div>

    <div class="notes-grid">
      <div class="note-card">
        <h3>&#128221; Summary Notes</h3>
        ${rows.filter(r=>r.summary&&r.summary.trim()&&r.summary.toLowerCase()!=='n/a').map(r=>`
          <div class="note-item">
            <div class="note-author">${r.attendee} <span class="badge b${String(r.year).slice(-2)}">${r.year}</span></div>
            ${r.summary}
          </div>`).join('') || '<div class="note-item" style="color:var(--muted)">No notes recorded.</div>'}
      </div>
      <div class="note-card">
        <h3>&#128161; Suggestions</h3>
        ${rows.filter(r=>r.suggestions&&r.suggestions.trim()&&r.suggestions.toLowerCase()!=='n/a'&&r.suggestions.toLowerCase()!=='none').map(r=>`
          <div class="note-item">
            <div class="note-author">${r.attendee} <span class="badge b${String(r.year).slice(-2)}">${r.year}</span></div>
            ${r.suggestions}
          </div>`).join('') || '<div class="note-item" style="color:var(--muted)">No suggestions recorded.</div>'}
      </div>
    </div>`;

  charts.yoy = new Chart(document.getElementById('chartYoY'), {
    type: 'bar',
    data: {
      labels: byYear.map(b=>String(b.year)),
      datasets: [{label:'Total Spend', data:byYear.map(b=>b.total), backgroundColor:byYear.map(b=>b.year===2025?'#f8182d':'#6366f1'), borderRadius:5}]
    },
    options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()}}}}
  });

  const hasData = totFees+totAir+totMeals+totMileage+Math.max(totOther,0) > 0;
  if (hasData) {
    charts.breakdown = new Chart(document.getElementById('chartBreakdown'), {
      type: 'doughnut',
      data: {
        labels: ['Consultant Fees','Air Travel','Meals','Mileage','Other Expenses'],
        datasets: [{data:[totFees,totAir,totMeals,totMileage,Math.max(totOther,0)], backgroundColor:['#f8182d','#6366f1','#e4cc99','#d97706','#0f172a'], borderWidth:2}]
      },
      options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}
    });
  }

  const filtRows = rows.filter(r=>r.total>0).sort((a,b)=>a.total-b.total);
  if (filtRows.length > 0) {
    charts.hist = new Chart(document.getElementById('chartHist'), {
      type: 'bar',
      data: {labels:filtRows.map(r=>r.attendee.split(' ').slice(-1)[0]+' '+r.year), datasets:[{label:'Total Billed', data:filtRows.map(r=>r.total), backgroundColor:'#6366f1', borderRadius:4}]},
      options: {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()}}}}
    });
  }
}

function updateBudgetStatus(key, val, netLastTotal) {
  const budget = parseFloat(val) || 0;
  const b = getBudgetsLS(); b[key] = budget; saveBudgetsLS(b);
  const statusEl = document.getElementById('budgetStatus');
  if (!statusEl || budget <= 0) { if(statusEl) statusEl.innerHTML = ''; return; }
  const diff = budget - netLastTotal;
  const pct = Math.abs(Math.round(diff/budget*100));
  statusEl.innerHTML = diff >= 0
    ? `<span class="bstatus under">&#10003; ${fmtN(diff)} under budget (${pct}%)</span>`
    : `<span class="bstatus over">&#10007; ${fmtN(Math.abs(diff))} over budget (${pct}%)</span>`;
}

function updateSponsorship(key, year, val) {
  const amount = parseFloat(val) || 0;
  const s = getSponsorships();
  s[key + '__' + year] = amount;
  saveSponsorships(s);
  buildSidebar();
}

function openPlanModal(key) {
  const DATA = getData();
  const confs = getConferences(DATA);
  const conf = confs.find(c=>c.key===key);
  if (!conf) return;
  const modal = document.getElementById('planModal');
  document.getElementById('planModalSub').textContent = `Based on ${conf.rows.length} historical reports (${[...conf.years].sort().join(', ')})`;
  modal.classList.add('open');
  const plan = PLANS[key];
  if (plan) {
    document.getElementById('planModalBody').innerHTML = `<div class="modal-body" style="white-space:normal">${plan}</div>`;
  } else {
    const rows = conf.rows;
    const totalAll = rows.reduce((s,r)=>s+r.total,0);
    const suggestions = rows.filter(r=>r.suggestions&&r.suggestions.trim()&&!['n/a','none'].some(x=>r.suggestions.toLowerCase().startsWith(x))).map(r=>`<li><strong>${r.attendee} (${r.year}):</strong> ${r.suggestions}</li>`).join('');
    document.getElementById('planModalBody').innerHTML = `<div class="modal-body" style="white-space:normal">
      <h3>${key} — Planning Summary</h3>
      <p><strong>Total historical spend:</strong> ${fmtN(totalAll)} across ${rows.length} reports</p>
      <p><strong>Attendees:</strong> ${[...new Set(rows.map(r=>r.attendee))].join(', ')}</p>
      ${suggestions ? `<h4>Team Suggestions from Past Years</h4><ul>${suggestions}</ul>` : ''}
    </div>`;
  }
}

// ─── ADMIN PANEL ──────────────────────────────────────────────────────────────
let adminTabIndex = 0;
function openAdmin() {
  document.getElementById('adminOverlay').classList.add('open');
  switchAdminTab(0);
}
function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('open');
  // Refresh after possible changes
  buildSidebar();
  if (currentConf) showConf(currentConf); else showOverview();
}
function adminOverlayClick(e) {
  if (e.target === document.getElementById('adminOverlay')) closeAdmin();
}
function switchAdminTab(idx) {
  adminTabIndex = idx;
  document.querySelectorAll('.admin-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  const body = document.getElementById('adminBody');
  if (idx===0) renderAdminNamesTab(body);
  else if (idx===1) renderAdminSponsTab(body);
  else if (idx===2) renderAdminBudgetsTab(body);
  else renderAdminDataTab(body);
}

function renderAdminNamesTab(body) {
  const overrides = getNameOverrides();
  const rawNames = [...new Set(RAW.map(r=>r.conference))].sort();
  body.innerHTML = `
    <div class="admin-section">
      <h3>Conference Name Manager</h3>
      <p>Some conference names were entered slightly differently across reports. Use this to merge them into a single canonical name. Changes are saved immediately and persist across sessions.</p>
      <div style="display:grid;grid-template-columns:20px 1fr 24px 1fr;gap:8px;align-items:center;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;padding:0 4px;">
        <span>#</span><span>RAW NAME (as entered)</span><span></span><span>CANONICAL NAME (used in dashboard)</span>
      </div>
      <div id="nameRows">
        ${rawNames.map((name,i) => {
          const current = overrides[name] || normalize(name);
          return `<div style="display:grid;grid-template-columns:20px 1fr 24px 1fr;gap:8px;align-items:center;margin-bottom:6px;">
            <span style="font-size:11px;color:var(--muted)">${i+1}</span>
            <div style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:13px;">${name}</div>
            <span style="text-align:center;color:var(--muted)">&#8594;</span>
            <input type="text" value="${current}" data-raw="${name.replace(/"/g,'&quot;')}" onchange="saveNameOverride(this)" style="padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-size:13px;" placeholder="Canonical name...">
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;align-items:center;">
        <button class="btn btn-primary" onclick="applyNameOverrides()">&#10003; Apply Changes</button>
        <button class="btn btn-outline" onclick="resetNameOverrides()">&#8635; Reset All to Default</button>
        <span style="font-size:12px;color:var(--muted)" id="nameSaveMsg"></span>
      </div>
    </div>`;
}

function saveNameOverride(input) {
  const raw = input.getAttribute('data-raw');
  const canonical = input.value.trim();
  const overrides = getNameOverrides();
  if (!canonical || canonical === normalize(raw)) {
    delete overrides[raw];
  } else {
    overrides[raw] = canonical;
  }
  saveNameOverrides(overrides);
}

function applyNameOverrides() {
  buildSidebar();
  if (currentConf) showConf(currentConf); else showOverview();
  showToast('Conference names updated!');
  document.getElementById('nameSaveMsg').textContent = 'Saved and applied.';
  setTimeout(()=>{const m=document.getElementById('nameSaveMsg');if(m)m.textContent='';},3000);
}

function resetNameOverrides() {
  if (!confirm('Reset all conference name overrides to defaults?')) return;
  saveNameOverrides({});
  switchAdminTab(0);
  showToast('Name overrides reset.');
}

function renderAdminSponsTab(body) {
  const DATA = getData();
  const allConfs = Object.values(DATA.reduce((m,r)=>{
    if(!m[r.confKey]) m[r.confKey]={key:r.confKey,years:new Set()};
    m[r.confKey].years.add(r.year);
    return m;
  },{})).sort((a,b)=>a.key.localeCompare(b.key));
  const sponsorships = getSponsorships();
  body.innerHTML = `
    <div class="admin-section">
      <h3>Sponsorship Amounts</h3>
      <p>Enter the sponsorship amount FPM received for each conference and year. This reduces the net cost shown in the dashboard and is saved across sessions.</p>
      <table style="max-width:600px">
        <thead><tr><th>Conference</th><th>Year</th><th class="money">Sponsorship Amount</th></tr></thead>
        <tbody>
          ${allConfs.map(c => [...c.years].sort().map(yr => {
            const sk = c.key + '__' + yr;
            const val = sponsorships[sk] || '';
            return `<tr>
              <td>${c.key}</td>
              <td><span class="badge b${String(yr).slice(-2)}">${yr}</span></td>
              <td class="money"><input type="number" placeholder="0.00" value="${val}" onchange="saveSponsorship('${c.key.replace(/'/g,"\\'")}", ${yr}, this.value)" style="text-align:right;padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:13px;width:130px;"></td>
            </tr>`;
          }).join('')).join('')}
        </tbody>
      </table>
      <p style="margin-top:12px;font-size:12px;color:var(--muted)">Changes are saved automatically as you type.</p>
    </div>`;
}

function saveSponsorship(key, year, val) {
  const amount = parseFloat(val) || 0;
  const s = getSponsorships();
  if (amount === 0) delete s[key + '__' + year];
  else s[key + '__' + year] = amount;
  saveSponsorships(s);
  showToast('Sponsorship saved!');
  buildSidebar();
}

function renderAdminBudgetsTab(body) {
  const DATA = getData();
  const allConfs = Object.values(DATA.reduce((m,r)=>{
    if(!m[r.confKey]) m[r.confKey]={key:r.confKey};
    return m;
  },{}));
  allConfs.sort((a,b)=>a.key.localeCompare(b.key));
  const budgets = getBudgetsLS();
  body.innerHTML = `
    <div class="admin-section">
      <h3>Annual Budgets</h3>
      <p>Set a budget per conference. This is compared against the most recent year's net cost (after sponsorships) on the conference detail page.</p>
      <table style="max-width:500px">
        <thead><tr><th>Conference</th><th class="money">Annual Budget</th></tr></thead>
        <tbody>
          ${allConfs.map(c => {
            const val = budgets[c.key] || '';
            return `<tr>
              <td>${c.key}</td>
              <td class="money"><input type="number" placeholder="0.00" value="${val}" onchange="saveBudgetAdmin('${c.key.replace(/'/g,"\\'")}", this.value)" style="text-align:right;padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:13px;width:130px;"></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <p style="margin-top:12px;font-size:12px;color:var(--muted)">Changes are saved automatically. Budgets persist across sessions.</p>
    </div>`;
}

function saveBudgetAdmin(key, val) {
  const amount = parseFloat(val) || 0;
  const b = getBudgetsLS();
  if (amount === 0) delete b[key];
  else b[key] = amount;
  saveBudgetsLS(b);
  showToast('Budget saved!');
}

function renderAdminDataTab(body) {
  const DATA = getData();
  body.innerHTML = `
    <div class="admin-section">
      <h3>Data Review</h3>
      <p>All ${DATA.length} conference report entries. The Canonical Name column shows how the conference is grouped in the dashboard (editable on the Conference Names tab).</p>
      <div class="data-table-wrap">
        <table>

                <td>${r.attendee}</td>

                <td class="money"><strong>${fmtN(r.total)}</strong></td>
                <td style="font-size:11px;white-space:nowrap">${r.dates}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSidebar();
showOverview();
